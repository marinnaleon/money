<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Finanças">
<title>Finanças</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #fdf8f6;
    --bg2:     #faf3f0;
    --surface: #ffffff;
    --rose1:   #fceee9;
    --rose2:   #f2cfc8;
    --rose3:   #e8b4aa;
    --rose4:   #c47a6e;
    --text:    #2d1f1b;
    --text2:   #8c6860;
    --text3:   #c9a89f;
    --border:  #f0dbd6;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body { height:100%; background:var(--bg); overscroll-behavior:none; }

  body {
    font-family:'DM Sans',sans-serif;
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }

  #app {
    width:100%;
    max-width:430px;
    margin:0 auto;
    height:100svh;
    display:flex;
    flex-direction:column;
    background:var(--bg);
    overflow:hidden;
  }

  /* ── HEADER ── */
  .hdr {
    padding:18px 22px 12px;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
  }

  .hdr-row {
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:3px;
  }

  .hdr-title {
    font-family:'Cormorant Garamond',serif;
    font-size:21px;
    font-weight:500;
    letter-spacing:0.01em;
    color:var(--text);
    line-height:1;
  }

  .hdr-date {
    font-size:11px;
    color:var(--text3);
    font-weight:300;
  }

  .hdr-total {
    font-size:12px;
    color:var(--text2);
    font-weight:300;
  }

  .hdr-total b {
    font-family:'Cormorant Garamond',serif;
    font-size:15px;
    font-weight:500;
    color:var(--rose4);
    font-style:normal;
  }

  /* ── TABS ── */
  .tabs {
    display:flex;
    border-bottom:1px solid var(--border);
    flex-shrink:0;
    padding:0 22px;
  }

  .tab {
    flex:1;
    padding:9px 4px 10px;
    background:none;
    border:none;
    border-bottom:2px solid transparent;
    margin-bottom:-1px;
    color:var(--text3);
    font-family:'DM Sans',sans-serif;
    font-size:11px;
    font-weight:400;
    letter-spacing:0.06em;
    text-transform:uppercase;
    cursor:pointer;
    transition:color .2s, border-color .2s;
  }

  .tab.active { color:var(--rose4); border-bottom-color:var(--rose4); font-weight:500; }

  /* ── PANELS ── */
  .panel { display:none; flex:1; flex-direction:column; overflow:hidden; }
  .panel.active { display:flex; }

  /* scrollable areas */
  .scroll {
    flex:1;
    overflow-y:auto;
    -webkit-overflow-scrolling:touch;
    padding:18px 22px 24px;
  }

  /* ── CHAT ── */
  #msgs { display:flex; flex-direction:column; gap:14px; }

  .msg { display:flex; gap:9px; align-items:flex-end; animation:up .22s ease; }
  .msg.user { flex-direction:row-reverse; }

  @keyframes up { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .mdot {
    width:26px; height:26px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-size:12px;
  }
  .msg.ai .mdot { background:var(--rose1); color:var(--rose4); }
  .msg.user .mdot { background:var(--rose2); color:var(--text); }

  .mbub {
    max-width:78%;
    padding:10px 13px;
    border-radius:15px;
    font-size:14px;
    line-height:1.55;
    font-weight:300;
  }
  .msg.ai .mbub {
    background:var(--surface);
    border:1px solid var(--border);
    border-bottom-left-radius:3px;
  }
  .msg.user .mbub {
    background:var(--rose2);
    border-bottom-right-radius:3px;
    color:var(--text);
  }

  /* expense card in chat */
  .ecard {
    margin-top:8px;
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 12px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .eico {
    width:34px; height:34px;
    background:var(--rose1);
    border-radius:9px;
    display:flex; align-items:center; justify-content:center;
    font-size:17px; flex-shrink:0;
  }
  .einfo { flex:1; min-width:0; }
  .ename { font-size:13px; font-weight:400; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .emeta { font-size:11px; color:var(--text2); font-weight:300; margin-top:1px; }
  .eval {
    font-family:'Cormorant Garamond',serif;
    font-size:17px; font-weight:500;
    color:var(--rose4); flex-shrink:0;
  }

  /* typing */
  .typing { display:flex; gap:4px; align-items:center; }
  .typing span {
    width:5px; height:5px; background:var(--rose3); border-radius:50%;
    animation:blink 1.1s infinite;
  }
  .typing span:nth-child(2){animation-delay:.18s}
  .typing span:nth-child(3){animation-delay:.36s}
  @keyframes blink {
    0%,60%,100%{opacity:.3;transform:scale(1)}
    30%{opacity:1;transform:scale(1.25)}
  }

  /* chips */
  .chips {
    padding:8px 22px 0;
    display:flex; gap:6px;
    overflow-x:auto; scrollbar-width:none; flex-shrink:0;
  }
  .chips::-webkit-scrollbar{display:none}

  .chip {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:50px;
    padding:5px 12px;
    font-size:12px; font-weight:300;
    color:var(--text2);
    white-space:nowrap;
    cursor:pointer;
    flex-shrink:0;
    transition:background .15s, border-color .15s;
  }
  .chip:active { background:var(--rose1); border-color:var(--rose2); }

  /* input bar */
  .ibar {
    padding:10px 22px 20px;
    display:flex; gap:8px; align-items:center;
    flex-shrink:0;
    border-top:1px solid var(--border);
  }

  .cinput {
    flex:1;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:50px;
    padding:10px 16px;
    font-family:'DM Sans',sans-serif;
    font-size:14px; font-weight:300;
    color:var(--text);
    outline:none;
    -webkit-appearance:none;
    transition:border-color .2s;
  }
  .cinput::placeholder { color:var(--text3); }
  .cinput:focus { border-color:var(--rose3); }

  .sbtn {
    width:40px; height:40px;
    border-radius:50%;
    background:var(--rose3);
    border:none; color:#fff;
    font-size:14px;
    cursor:pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition:background .2s, transform .15s;
  }
  .sbtn:active { transform:scale(.92); }
  .sbtn:disabled { background:var(--rose1); color:var(--rose3); }

  /* ── DASHBOARD ── */
  .prow { display:flex; gap:6px; margin-bottom:18px; }

  .pbtn {
    padding:6px 14px;
    border-radius:50px;
    border:1px solid var(--border);
    background:var(--surface);
    color:var(--text2);
    font-family:'DM Sans',sans-serif;
    font-size:12px; font-weight:400;
    cursor:pointer;
    transition:all .15s;
  }
  .pbtn.active { background:var(--rose2); border-color:var(--rose2); color:var(--text); font-weight:500; }

  .slbl {
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:.08em;
    color:var(--text3);
    font-weight:400;
    margin:20px 0 10px;
  }
  .slbl:first-of-type { margin-top:0; }

  .sgrid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }

  .scard {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px 16px;
  }
  .scard .sl { font-size:11px; color:var(--text3); font-weight:300; margin-bottom:6px; }
  .scard .sv {
    font-family:'Cormorant Garamond',serif;
    font-size:22px; font-weight:500; color:var(--text); line-height:1;
  }
  .scard.ac .sv { color:var(--rose4); }
  .scard .sv.sm { font-size:15px; }

  /* categories */
  .clist { display:flex; flex-direction:column; gap:8px; }

  .crow {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:12px 14px;
  }

  .ctop { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .cleft { display:flex; align-items:center; gap:9px; }
  .cemi { font-size:18px; }
  .cname { font-size:14px; font-weight:400; }
  .ccnt { font-size:11px; color:var(--text3); font-weight:300; margin-top:1px; }
  .camt { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:500; color:var(--rose4); }

  .barbg { height:3px; background:var(--rose1); border-radius:2px; overflow:hidden; }
  .barfill { height:100%; background:var(--rose3); border-radius:2px; transition:width .7s cubic-bezier(.4,0,.2,1); }

  /* day chart */
  .dchart {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px 14px 10px;
  }

  .dbars {
    display:flex; align-items:flex-end;
    gap:4px; height:64px; margin-bottom:8px;
  }

  .dcol {
    flex:1; display:flex; flex-direction:column;
    align-items:center; gap:4px; height:100%;
  }
  .dbwrap { flex:1; width:100%; display:flex; align-items:flex-end; }
  .dbar { width:100%; background:var(--rose1); border-radius:3px 3px 0 0; min-height:0; transition:height .5s ease; }
  .dbar.today { background:var(--rose3); }
  .dlbl { font-size:10px; color:var(--text3); font-weight:300; }

  /* ── TRANSACTIONS ── */
  .txwrap { display:flex; flex-direction:column; gap:7px; }

  .txitem {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:11px 14px;
    display:flex; align-items:center; gap:11px;
    animation:up .2s ease;
  }
  .txico {
    width:34px; height:34px;
    background:var(--rose1); border-radius:9px;
    display:flex; align-items:center; justify-content:center;
    font-size:17px; flex-shrink:0;
  }
  .txinfo { flex:1; min-width:0; }
  .txd { font-size:13px; font-weight:400; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .txm { font-size:11px; color:var(--text3); font-weight:300; margin-top:1px; }
  .txr { display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .txa { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:500; color:var(--rose4); }
  .txdel { background:none; border:none; color:var(--text3); cursor:pointer; font-size:13px; padding:4px; transition:color .15s; }
  .txdel:hover { color:var(--rose4); }

  /* empty */
  .empty { text-align:center; padding:48px 20px; color:var(--text3); }
  .empty .ei { font-size:32px; margin-bottom:10px; opacity:.5; }
  .empty p { font-size:13px; line-height:1.7; font-weight:300; }

  ::-webkit-scrollbar { width:3px; }
  ::-webkit-scrollbar-track { background:transparent; }
  ::-webkit-scrollbar-thumb { background:var(--rose2); border-radius:2px; }
</style>
</head>
<body>
<div id="app">

  <div class="hdr">
    <div class="hdr-row">
      <div class="hdr-title">finanças ✦</div>
      <div class="hdr-date" id="hdate"></div>
    </div>
    <div class="hdr-total">total gasto &nbsp;<b id="htotal">R$ 0,00</b></div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('chat')">Chat</button>
    <button class="tab" onclick="switchTab('dashboard')">Resumo</button>
    <button class="tab" onclick="switchTab('transactions')">Lançamentos</button>
  </div>

  <!-- CHAT -->
  <div id="panel-chat" class="panel active">
    <div class="scroll" id="chat-scroll">
      <div id="msgs"></div>
    </div>
    <div class="chips">
      <span class="chip" onclick="fillChip('Gastei 15 reais na padaria')">☕ padaria</span>
      <span class="chip" onclick="fillChip('Uber de 22 reais')">🚗 uber</span>
      <span class="chip" onclick="fillChip('Supermercado 180 reais')">🛒 mercado</span>
      <span class="chip" onclick="fillChip('Quanto gastei esse mês?')">📊 resumo</span>
    </div>
    <div class="ibar">
      <input class="cinput" id="cinput" placeholder="gastei 30 reais no almoço…" autocomplete="off"/>
      <button class="sbtn" id="sbtn" onclick="send()">➤</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="panel-dashboard" class="panel">
    <div class="scroll">
      <div class="prow">
        <button class="pbtn active" onclick="setPeriod('week',this)">7 dias</button>
        <button class="pbtn" onclick="setPeriod('month',this)">este mês</button>
        <button class="pbtn" onclick="setPeriod('all',this)">tudo</button>
      </div>
      <div class="sgrid">
        <div class="scard ac"><div class="sl">gasto total</div><div class="sv" id="d-total">R$ 0</div></div>
        <div class="scard"><div class="sl">lançamentos</div><div class="sv" id="d-count">0</div></div>
        <div class="scard"><div class="sl">média por dia</div><div class="sv" id="d-avg">R$ 0</div></div>
        <div class="scard"><div class="sl">top categoria</div><div class="sv sm" id="d-top">—</div></div>
      </div>
      <div class="slbl">por categoria</div>
      <div class="clist" id="clist"><div class="empty"><div class="ei">🌸</div><p>nenhum dado ainda.<br>use o chat para registrar gastos.</p></div></div>
      <div class="slbl">por dia da semana</div>
      <div class="dchart"><div class="dbars" id="dbars"></div></div>
    </div>
  </div>

  <!-- TRANSACTIONS -->
  <div id="panel-transactions" class="panel">
    <div class="scroll">
      <div class="txwrap" id="txlist"><div class="empty"><div class="ei">🌸</div><p>nenhum lançamento ainda.<br>use o chat para adicionar.</p></div></div>
    </div>
  </div>

</div>
<script>
const KEY='fin_v3';
const CATS={'Alimentação':'🍽️','Transporte':'🚗','Saúde':'💊','Lazer':'🎮','Moradia':'🏠','Educação':'📚','Roupas':'👕','Beleza':'💅','Mercado':'🛒','Serviços':'🔧','Outros':'📦'};
let expenses=(()=>{try{return JSON.parse(localStorage.getItem(KEY))||[];}catch{return [];}})();
let period='week';
const save=()=>localStorage.setItem(KEY,JSON.stringify(expenses));
const brl=v=>'R$ '+v.toFixed(2).replace('.',',').replace(/\B(?=(\d{3})+(?!\d))/g,'.');
const today=()=>new Date().toISOString().slice(0,10);
const fmtD=iso=>{const[y,m,d]=iso.split('-');return`${d}/${m}/${y}`;};

function filtered(){
  const now=new Date();
  return expenses.filter(e=>{
    const d=new Date(e.date+'T12:00:00');
    if(period==='week')return(now-d)/86400000<=7;
    if(period==='month')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    return true;
  });
}

function updateHeader(){
  const now=new Date();
  const D=['domingo','segunda','terça','quarta','quinta','sexta','sábado'];
  const M=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  document.getElementById('hdate').textContent=`${D[now.getDay()]}, ${now.getDate()} ${M[now.getMonth()]}`;
  document.getElementById('htotal').textContent=brl(expenses.reduce((s,e)=>s+e.amount,0));
}

const msgsEl=document.getElementById('msgs');
const chatScroll=document.getElementById('chat-scroll');

function addMsg(role,html){
  const d=document.createElement('div');
  d.className=`msg ${role}`;
  d.innerHTML=`<div class="mdot">${role==='ai'?'✦':'·'}</div><div class="mbub">${html}</div>`;
  msgsEl.appendChild(d);
  chatScroll.scrollTop=chatScroll.scrollHeight;
}

function addTyping(){
  const d=document.createElement('div');
  d.className='msg ai';d.id='typ';
  d.innerHTML=`<div class="mdot">✦</div><div class="mbub"><div class="typing"><span></span><span></span><span></span></div></div>`;
  msgsEl.appendChild(d);chatScroll.scrollTop=chatScroll.scrollHeight;
}
const rmTyping=()=>document.getElementById('typ')?.remove();

function addExpCard(e){
  const d=document.createElement('div');
  d.className='msg ai';
  d.innerHTML=`<div class="mdot">✦</div><div class="mbub">registrado ✓<div class="ecard"><div class="eico">${CATS[e.category]||'📦'}</div><div class="einfo"><div class="ename">${e.description}</div><div class="emeta">${e.category} · ${fmtD(e.date)}</div></div><div class="eval">${brl(e.amount)}</div></div></div>`;
  msgsEl.appendChild(d);chatScroll.scrollTop=chatScroll.scrollHeight;
}

async function send(){
  const inp=document.getElementById('cinput'),btn=document.getElementById('sbtn');
  const text=inp.value.trim();if(!text)return;
  inp.value='';btn.disabled=true;
  addMsg('user',text);addTyping();
  const recent=expenses.slice(-5).map(e=>`${e.date}: ${e.description} ${brl(e.amount)} (${e.category})`).join('\n')||'nenhum';
  const sys=`Você é assistente de controle financeiro pessoal, responde em português brasileiro informal e gentil.
Quando o usuário relatar um gasto, responda SOMENTE com JSON:
{"tipo":"gasto","descricao":"...","valor":0.00,"categoria":"...","data":"YYYY-MM-DD","mensagem":"..."}
Categorias disponíveis: ${Object.keys(CATS).join(', ')}
Data hoje: ${today()}
Últimos gastos: ${recent}
Para perguntas sobre dados financeiros, responda em texto normal (sem JSON). Para outros assuntos, responda normalmente. Seja direto e amigável. Não use markdown.`;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys,messages:[{role:"user",content:text}]})});
    const data=await res.json();
    rmTyping();btn.disabled=false;
    const raw=(data.content?.[0]?.text||'').replace(/```json|```/g,'').trim();
    try{
      const p=JSON.parse(raw);
      if(p.tipo==='gasto'&&p.valor&&p.descricao){
        const exp={id:Date.now(),description:p.descricao,amount:parseFloat(p.valor),category:p.categoria||'Outros',date:p.data||today()};
        expenses.push(exp);save();updateHeader();
        addExpCard(exp);
        if(p.mensagem)setTimeout(()=>addMsg('ai',p.mensagem),300);
        return;
      }
    }catch(_){}
    addMsg('ai',raw.replace(/\n/g,'<br>'));
  }catch(e){rmTyping();btn.disabled=false;addMsg('ai','ops, algo deu errado. tenta de novo!');}
}

document.getElementById('cinput').addEventListener('keydown',e=>{if(e.key==='Enter')send();});
function fillChip(t){document.getElementById('cinput').value=t;document.getElementById('cinput').focus();}

function setPeriod(p,btn){
  period=p;
  document.querySelectorAll('.pbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');renderDash();
}

function renderDash(){
  const data=filtered();
  const total=data.reduce((s,e)=>s+e.amount,0);
  const days=Math.max([...new Set(data.map(e=>e.date))].length,1);
  document.getElementById('d-total').textContent=brl(total);
  document.getElementById('d-count').textContent=data.length;
  document.getElementById('d-avg').textContent=brl(total/days);
  const byCat={};
  data.forEach(e=>byCat[e.category]=(byCat[e.category]||0)+e.amount);
  const catArr=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  document.getElementById('d-top').textContent=catArr[0]?`${CATS[catArr[0][0]]||'📦'} ${catArr[0][0]}`:'—';
  const clist=document.getElementById('clist');
  if(!catArr.length){clist.innerHTML=`<div class="empty"><div class="ei">🌸</div><p>nenhum dado ainda.<br>use o chat para registrar gastos.</p></div>`;
  }else{
    const max=catArr[0][1];
    clist.innerHTML=catArr.map(([cat,amt])=>{
      const cnt=data.filter(e=>e.category===cat).length;
      const pct=(amt/max)*100;
      return`<div class="crow"><div class="ctop"><div class="cleft"><span class="cemi">${CATS[cat]||'📦'}</span><div><div class="cname">${cat}</div><div class="ccnt">${cnt} lançamento${cnt!==1?'s':''}</div></div></div><div class="camt">${brl(amt)}</div></div><div class="barbg"><div class="barfill" style="width:${pct}%"></div></div></div>`;
    }).join('');
  }
  const DLBL=['dom','seg','ter','qua','qui','sex','sáb'];
  const todayDow=new Date().getDay();
  const dayTot=Array(7).fill(0);
  data.forEach(e=>{const d=new Date(e.date+'T12:00:00');dayTot[d.getDay()]+=e.amount;});
  const maxD=Math.max(...dayTot,1);
  document.getElementById('dbars').innerHTML=dayTot.map((v,i)=>{
    const h=Math.max((v/maxD)*50,v>0?3:0);
    return`<div class="dcol"><div class="dbwrap"><div class="dbar${i===todayDow?' today':''}" style="height:${h}px"></div></div><div class="dlbl">${DLBL[i]}</div></div>`;
  }).join('');
}

function renderTx(){
  const el=document.getElementById('txlist');
  if(!expenses.length){el.innerHTML=`<div class="empty"><div class="ei">🌸</div><p>nenhum lançamento ainda.<br>use o chat para adicionar.</p></div>`;return;}
  el.innerHTML=[...expenses].sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id).map(e=>`
    <div class="txitem"><div class="txico">${CATS[e.category]||'📦'}</div><div class="txinfo"><div class="txd">${e.description}</div><div class="txm">${e.category} · ${fmtD(e.date)}</div></div><div class="txr"><div class="txa">${brl(e.amount)}</div><button class="txdel" onclick="delExp(${e.id})">✕</button></div></div>`).join('');
}

function delExp(id){expenses=expenses.filter(e=>e.id!==id);save();updateHeader();renderDash();renderTx();}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['chat','dashboard','transactions'][i]===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
  if(tab==='dashboard')renderDash();
  if(tab==='transactions')renderTx();
}

updateHeader();
setTimeout(()=>{
  addMsg('ai',`olá! 🌸 sou seu assistente financeiro.<br><br>me conta seus gastos:<br><em>gastei 35 reais no almoço</em><br><em>uber de 18 reais</em><br><em>conta de luz 120 reais</em><br><br>registro tudo automaticamente pra você.`);
},300);
</script>
